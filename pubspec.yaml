name: padosi_food
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.2

  # Responsive sizing
  flutter_screenutil: ^5.9.3

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.0.5
  cached_network_image: ^3.4.1

  # Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # UI / UX
  fluttertoast: ^8.2.8
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1

  # Forms / input
  pinput: ^5.0.0

  # Media / files
  image_picker: ^1.1.2
  flutter_image_compress: ^2.3.0
  permission_handler: ^11.3.1
  path_provider: ^2.1.4
  mime: ^1.0.6
  http_parser: ^4.0.2
  open_file: ^3.5.7

  # Push notifications
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Utilities
  intl: ^0.19.0
  package_info_plus: ^8.0.2
  url_launcher: ^6.3.0

  # Maps (free — OpenStreetMap tiles, no API key)
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  http: ^1.2.2
  geolocator: ^13.0.1

  # Typography (Space Grotesk + Inter via Google Fonts)
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
